{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Admin Site for Animal Shelter</title>
        <!-- <meta name = "viewport" content="width=device-width, initial-scale=1"> -->
        <link rel = "stylesheet" href = "{% static 'css/main.css' %}"/>
        <link rel = "stylesheet" href = "{% static 'css/normalize.css' %}"/>
        <link rel = "stylesheet" href = "{% static 'css/skeleton.css' %}"/>
    </head>
    <body>
        <div class = "container">
        <div class = "row">
        <div class = "three columns">
            <table>
            <thread>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Picture</th>
                <th>Description</th>
                <th>Date Entered</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
            </thread>
            <tbody>
                {% for pet in pet_list %}
                <tr>
                <td>{{pet.pet_name}}</td>
                <td>{{pet.pet_age}}</td>
                <td><img src="{{ pet.pet_img.url }}"width="150" height="160" /></td>
                <td>{{pet.pet_paragraph}}</td>
                <td>{{pet.date_entered}}</td>
                <td><a href = "{% url 'edit_pet' pet.id %}">Edit</a></td>
                <td><a href = "{% url 'del_pet' pet.id %}">Remove this Pet from database</a></td>
            </tr>
            {% endfor %}
            </tbody>
            </table>
            <div class = center>
                <a href="{% url 'add_pet' %}">Add Pet</a>
            </div>
            </div>
          
            </div>

        </div>
        
    </body>

    </html>
</html>
